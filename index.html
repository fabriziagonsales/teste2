<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Salão de Beleza</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .page-center {
      text-align: center;
      color: #555;
    }

    .page-center h1 { font-size: 2rem; color: #b06a8c; margin-bottom: 8px; }
    .page-center p  { font-size: 1rem; }

    /* ── Botão flutuante ── */
    #chat-toggle {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: #b06a8c;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(0,0,0,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      z-index: 1000;
    }
    #chat-toggle:hover { background: #944f75; }
    #chat-toggle svg { width: 28px; height: 28px; fill: white; }

    /* ── Janela do chat ── */
    #chat-window {
      position: fixed;
      bottom: 96px;
      right: 24px;
      width: 340px;
      max-height: 520px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.18);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      z-index: 999;
      transform: scale(0.85);
      opacity: 0;
      pointer-events: none;
      transform-origin: bottom right;
      transition: transform 0.25s ease, opacity 0.25s ease;
    }
    #chat-window.open {
      transform: scale(1);
      opacity: 1;
      pointer-events: all;
    }

    /* ── Cabeçalho ── */
    .chat-header {
      background: #b06a8c;
      color: white;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .chat-header .avatar {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: white;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .chat-header .info .name  { font-weight: 600; font-size: 0.95rem; }
    .chat-header .info .status { font-size: 0.75rem; opacity: 0.85; }

    /* ── Mensagens ── */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 14px 12px;
      background: #fdf4f8;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .msg {
      max-width: 80%;
      padding: 10px 13px;
      border-radius: 14px;
      font-size: 0.88rem;
      line-height: 1.45;
      animation: fadeIn 0.3s ease;
    }
    .msg.bot {
      background: white;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .msg.user {
      background: #b06a8c;
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    /* ── Botões de opção ── */
    .options {
      display: flex;
      flex-direction: column;
      gap: 7px;
      align-self: flex-start;
      width: 100%;
      animation: fadeIn 0.3s ease;
    }
    .opt-btn {
      background: white;
      border: 1.5px solid #b06a8c;
      color: #b06a8c;
      border-radius: 20px;
      padding: 8px 14px;
      font-size: 0.85rem;
      cursor: pointer;
      text-align: left;
      transition: background 0.15s, color 0.15s;
    }
    .opt-btn:hover { background: #b06a8c; color: white; }

    /* ── Rodapé ── */
    .chat-footer {
      padding: 10px 12px;
      background: white;
      border-top: 1px solid #f0e0e8;
      font-size: 0.72rem;
      color: #aaa;
      text-align: center;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Mobile ── */
    @media (max-width: 400px) {
      #chat-window { width: calc(100vw - 20px); right: 10px; bottom: 86px; }
    }
  </style>
</head>
<body>

  <div class="page-center">
    <h1>✂️ Salão de Beleza</h1>
    <p>Clique no ícone no canto inferior direito para falar conosco!</p>
  </div>

  <!-- Botão flutuante -->
  <button id="chat-toggle" aria-label="Abrir chat">
    <svg viewBox="0 0 24 24"><path d="M20 2H4a2 2 0 0 0-2 2v18l4-4h14a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2z"/></svg>
  </button>

  <!-- Janela do chat -->
  <div id="chat-window">
    <div class="chat-header">
      <div class="avatar">✂️</div>
      <div class="info">
        <div class="name">Salão de Beleza</div>
        <div class="status">🟢 Online agora</div>
      </div>
    </div>

    <div class="chat-messages" id="messages"></div>

    <div class="chat-footer">Powered by IA · Fabrizia Soluções Digitais</div>
  </div>

  <script>
    const toggle  = document.getElementById('chat-toggle');
    const window_ = document.getElementById('chat-window');
    const msgs    = document.getElementById('messages');

    let started = false;

    toggle.addEventListener('click', () => {
      window_.classList.toggle('open');
      if (!started) { started = true; setTimeout(startFlow, 400); }
    });

    function addMsg(text, type = 'bot') {
      const d = document.createElement('div');
      d.className = `msg ${type}`;
      d.innerHTML = text;
      msgs.appendChild(d);
      msgs.scrollTop = msgs.scrollHeight;
    }

    function addOptions(options) {
      const wrap = document.createElement('div');
      wrap.className = 'options';
      options.forEach(({ label, action }) => {
        const btn = document.createElement('button');
        btn.className = 'opt-btn';
        btn.textContent = label;
        btn.onclick = () => {
          wrap.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
          wrap.style.opacity = '0.5';
          addMsg(label, 'user');
          setTimeout(() => action(), 400);
        };
        wrap.appendChild(btn);
      });
      msgs.appendChild(wrap);
      msgs.scrollTop = msgs.scrollHeight;
    }

    function startFlow() {
      addMsg('Olá! 😊 Bem-vindo ao <strong>Salão de Beleza</strong>!<br>Como posso te ajudar hoje?');
      setTimeout(() => {
        addOptions([
          { label: '📅 Agendar horário',         action: flowAgendar },
          { label: '💅 Ver serviços e preços',   action: flowServicos },
          { label: '💬 Falar com atendente',     action: flowAtendente },
        ]);
      }, 600);
    }

    function flowAgendar() {
      addMsg('Para agendar seu horário, entre em contato diretamente com a gente pelo WhatsApp. 📱<br>Em breve teremos agendamento automático aqui mesmo!');
      setTimeout(() => addWhatsApp(), 800);
    }

    function flowServicos() {
      addMsg(
        'Nossos serviços: ✂️<br>' +
        '✂️ <b>Corte</b> — a partir de R$ XX<br>' +
        '💅 <b>Manicure/Pedicure</b> — a partir de R$ XX<br>' +
        '🎨 <b>Coloração</b> — a partir de R$ XX<br>' +
        '💇 <b>Escova</b> — a partir de R$ XX<br><br>' +
        'Para mais informações ou agendar, fale com a gente!'
      );
      setTimeout(() => addWhatsApp(), 800);
    }

    function flowAtendente() {
      addMsg('Claro! Vou te transferir para nossa atendente agora. 😊<br>Um momento, por favor!');
      setTimeout(() => addWhatsApp(), 800);
    }

    function addWhatsApp() {
      // Troque pelo número real: 5547999999999
      const numero = '5547999999999';
      const texto  = encodeURIComponent('Olá! Vi o chatbot do salão e gostaria de mais informações 😊');
      addMsg(
        `<a href="https://wa.me/${numero}?text=${texto}" target="_blank"
           style="display:inline-flex;align-items:center;gap:6px;background:#25D366;color:white;
                  padding:9px 14px;border-radius:20px;text-decoration:none;font-size:0.85rem;font-weight:600;">
          <svg width="16" height="16" fill="white" viewBox="0 0 24 24">
            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15
                     -.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075
                     -.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059
                     -.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52
                     .149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52
                     -.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51
                     -.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372
                     -.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074
                     .149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625
                     .712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413
                     .248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
            <path d="M12 0C5.373 0 0 5.373 0 12c0 2.123.554 4.117 1.522 5.848L.057 23.804
                     a.75.75 0 0 0 .92.92l5.956-1.465A11.945 11.945 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0z
                     M12 22a9.944 9.944 0 0 1-5.073-1.386l-.363-.216-3.764.927.944-3.653-.236-.376
                     A9.944 9.944 0 0 1 2 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/>
          </svg>
          Falar no WhatsApp
        </a>`
      );
    }
  </script>
</body>
</html>
